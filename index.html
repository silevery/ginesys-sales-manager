<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Manager - Ginesys</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [data-testid="geist-provider"] { all: revert; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect } = React;
const { BarChart3, Users, TrendingUp, Award, CheckCircle2, AlertCircle, Plus, X, Edit2, Trash2, Eye, EyeOff, Download, Calendar, Target, MessageSquare, Phone, Video, Building2, Users2, Zap, FileText, Clock } = window.lucide;

const SalesManagementSystem = () => {
  const [currentUser, setCurrentUser] = useState(null);
  const [users, setUsers] = useState([
    { id: 'user_1', name: 'Srinivas', role: 'manager', email: 'srinivas@company.com' },
    { id: 'user_2', name: 'Kamal alawadhi', role: 'sales_rep', email: 'kamal@company.com' },
    { id: 'user_3', name: 'Simmi Khan', role: 'sales_rep', email: 'simmi@company.com' },
    { id: 'user_4', name: 'Ajay Singh Chauhan', role: 'sales_rep', email: 'ajay@company.com' },
    { id: 'user_5', name: 'Bhargav Oza', role: 'sales_rep', email: 'bhargav@company.com' },
    { id: 'user_6', name: 'Soubhik Mahata', role: 'sales_rep', email: 'soubhik@company.com' },
    { id: 'user_7', name: 'Yaqub Shaik', role: 'sales_rep', email: 'yaqub@company.com' },
    { id: 'user_8', name: 'Maharshi Vastrala', role: 'sales_rep', email: 'maharshi@company.com' },
    { id: 'user_9', name: 'Nawab Suhail', role: 'sales_rep', email: 'nawab@company.com' },
    { id: 'user_10', name: 'Aswanth', role: 'sales_rep', email: 'aswanth@company.com' }
  ]);

  const [activities, setActivities] = useState([]);
  const [darReports, setDarReports] = useState([]);
  const [deals, setDeals] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [showActivityForm, setShowActivityForm] = useState(false);
  const [showDarForm, setShowDarForm] = useState(false);
  const [showDealForm, setShowDealForm] = useState(false);
  const [showTaskForm, setShowTaskForm] = useState(false);

  const [activityForm, setActivityForm] = useState({
    type: 'call',
    duration: '',
    notes: '',
    date: new Date().toISOString().split('T')[0]
  });

  const [darForm, setDarForm] = useState({
    date: new Date().toISOString().split('T')[0],
    todayActivity: '',
    tomorrowPlan: '',
    callsMade: 0,
    demosGiven: 0,
    negotiationsCalls: 0,
    onsiteMeetings: 0,
    onlineMeetings: 0,
    internalMeetings: 0,
    selfLeadsGenerated: 0,
    leadsConverted: 0,
    closures: 0
  });

  const [dealForm, setDealForm] = useState({
    companyName: '',
    prospectName: '',
    prospectEmail: '',
    prospectPhone: '',
    stage: 'lead',
    value: '',
    source: 'marketing',
    expectedClosureDate: '',
    notes: ''
  });

  const [taskForm, setTaskForm] = useState({
    assignedTo: '',
    title: '',
    description: '',
    dueDate: '',
    priority: 'medium'
  });

  useEffect(() => {
    const stored = localStorage.getItem('salesData');
    if (stored) {
      const data = JSON.parse(stored);
      setActivities(data.activities || []);
      setDarReports(data.darReports || []);
      setDeals(data.deals || []);
      setTasks(data.tasks || []);
    }
  }, []);

  useEffect(() => {
    localStorage.setItem('salesData', JSON.stringify({
      activities,
      darReports,
      deals,
      tasks
    }));
  }, [activities, darReports, deals, tasks]);

  const handleLogin = (userId) => {
    const user = users.find(u => u.id === userId);
    setCurrentUser(user);
  };

  const handleLogout = () => {
    setCurrentUser(null);
  };

  if (!currentUser) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
          <div className="text-center mb-8">
            <div className="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center mx-auto mb-4">
              <BarChart3 className="w-8 h-8 text-white" />
            </div>
            <h1 className="text-3xl font-bold text-gray-900 mb-2">Sales Manager</h1>
            <p className="text-gray-600">Ginesys ERP & POS Sales Team</p>
          </div>

          <div className="space-y-3">
            <p className="text-sm font-semibold text-gray-700 mb-4">Select your profile:</p>
            {users.map(user => (
              <button
                key={user.id}
                onClick={() => handleLogin(user.id)}
                className="w-full p-4 text-left border border-gray-200 rounded-lg hover:bg-indigo-50 hover:border-indigo-300 transition group"
              >
                <div className="flex items-center justify-between">
                  <div>
                    <p className="font-semibold text-gray-900 group-hover:text-indigo-600">{user.name}</p>
                    <p className="text-xs text-gray-500">{user.role === 'manager' ? '👨‍💼 Manager' : '📱 Sales Rep'}</p>
                  </div>
                  <div className="text-indigo-600 opacity-0 group-hover:opacity-100 transition">→</div>
                </div>
              </button>
            ))}
          </div>

          <div className="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <p className="text-xs text-blue-800">
              <strong>Demo:</strong> Click any user to log in. No password required.
            </p>
          </div>
        </div>
      </div>
    );
  }

  const isManager = currentUser.role === 'manager';
  const userActivities = activities.filter(a => a.userId === currentUser.id);
  const userDarReports = darReports.filter(d => d.userId === currentUser.id);
  const userDeals = deals.filter(d => d.userId === currentUser.id);
  const userTasks = tasks.filter(t => t.assignedTo === currentUser.id);
  const salesReps = users.filter(u => u.role === 'sales_rep');

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50">
      {/* Header */}
      <div className="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-lg flex items-center justify-center">
              <BarChart3 className="w-6 h-6 text-white" />
            </div>
            <div>
              <h1 className="text-2xl font-bold text-gray-900">Sales Manager</h1>
              <p className="text-xs text-gray-500">Ginesys ERP & POS</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <div className="text-right">
              <p className="text-sm font-semibold text-gray-900">{currentUser.name}</p>
              <p className="text-xs text-gray-500">{currentUser.role === 'manager' ? 'Manager' : 'Sales Rep'}</p>
            </div>
            <button
              onClick={handleLogout}
              className="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition font-medium text-sm"
            >
              Logout
            </button>
          </div>
        </div>
      </div>

      {/* Main Content */}
      <div className="max-w-7xl mx-auto px-6 py-8">
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
          <h2 className="text-2xl font-bold text-gray-900 mb-6">Welcome, {currentUser.name}!</h2>
          
          {isManager ? (
            <div className="space-y-6">
              <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-6">
                <h3 className="text-lg font-bold text-gray-900 mb-2">Manager Dashboard</h3>
                <p className="text-gray-600 mb-4">Team Overview:</p>
                <div className="space-y-2">
                  <p className="text-sm text-gray-700">📊 Total Sales Reps: {salesReps.length}</p>
                  <p className="text-sm text-gray-700">📈 Total Activities: {activities.length}</p>
                  <p className="text-sm text-gray-700">🎯 Total Deals: {deals.length}</p>
                  <p className="text-sm text-gray-700">✅ Completed Tasks: {tasks.filter(t => t.status === 'completed').length}</p>
                  <p className="text-sm text-gray-700">⏳ Pending Tasks: {tasks.filter(t => t.status === 'pending').length}</p>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                  <h4 className="font-bold text-gray-900 mb-2">Team Members</h4>
                  {salesReps.map(rep => (
                    <p key={rep.id} className="text-sm text-gray-600">✓ {rep.name}</p>
                  ))}
                </div>
                <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                  <h4 className="font-bold text-gray-900 mb-2">Quick Stats</h4>
                  <p className="text-sm text-gray-600">DAR Reports: {darReports.length}</p>
                  <p className="text-sm text-gray-600">Won Deals: {deals.filter(d => d.stage === 'closed_won').length}</p>
                  <p className="text-sm text-gray-600">Active Pipeline: {deals.filter(d => d.stage !== 'closed_won' && d.stage !== 'closed_lost').length}</p>
                </div>
              </div>
            </div>
          ) : (
            <div className="space-y-6">
              <div className="bg-purple-50 border border-purple-200 rounded-lg p-6">
                <h3 className="text-lg font-bold text-gray-900 mb-2">Sales Rep Dashboard</h3>
                <p className="text-gray-600 mb-4">Your Performance:</p>
                <div className="space-y-2">
                  <p className="text-sm text-gray-700">📊 Your Activities: {userActivities.length}</p>
                  <p className="text-sm text-gray-700">📝 DAR Reports: {userDarReports.length}</p>
                  <p className="text-sm text-gray-700">🎯 Your Deals: {userDeals.length}</p>
                  <p className="text-sm text-gray-700">✅ Won Deals: {userDeals.filter(d => d.stage === 'closed_won').length}</p>
                  <p className="text-sm text-gray-700">📋 Pending Tasks: {userTasks.filter(t => t.status === 'pending').length}</p>
                </div>
              </div>

              <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
                <h3 className="text-lg font-bold text-gray-900 mb-4">Available Actions</h3>
                <div className="grid grid-cols-2 gap-4">
                  <button className="p-3 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition font-medium">
                    📞 Log Activity
                  </button>
                  <button className="p-3 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 transition font-medium">
                    📝 Submit DAR
                  </button>
                  <button className="p-3 bg-orange-100 text-orange-700 rounded-lg hover:bg-orange-200 transition font-medium">
                    🎯 Add Deal
                  </button>
                  <button className="p-3 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 transition font-medium">
                    🏆 View Leaderboard
                  </button>
                </div>
              </div>
            </div>
          )}

          <div className="mt-8 p-4 bg-gray-100 rounded-lg text-center">
            <p className="text-sm text-gray-600">
              ✅ Sales Manager App is Working! All data is saved locally.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SalesManagementSystem />);
    </script>
</body>
</html>
